<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thrive • Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-3 text-white">
        <i class="fa-solid fa-seedling text-4xl"></i>
        <span class="text-4xl font-bold">Thrive</span>
      </a>
    </div>

    <div class="bg-white rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Welcome back</h2>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Email</label>
          <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-violet-400" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-violet-400" required>
        </div>

        <button type="submit" 
                class="w-full py-3.5 bg-violet-600 hover:bg-violet-700 text-white font-semibold rounded-2xl transition">
          Log In
        </button>
      </form>

      <div id="error" class="mt-4 text-red-500 text-sm text-center hidden"></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.add('hidden');

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });

      if (res.ok) {
        const data = await res.json();
        if (data.role === 'parent') window.location.href = '/parent';
        else window.location.href = '/app';
      } else {
        errorEl.textContent = 'Invalid email or password';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
