<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thrive • Parent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-8">
    <div class="flex items-center justify-between mb-10">
      <div>
        <span class="font-bold text-4xl text-slate-800">Thrive</span>
        <span class="text-slate-400 ml-2">Parent Dashboard</span>
      </div>
      <button onclick="logout()" class="text-sm px-5 py-2 rounded-2xl border border-slate-300 hover:bg-white">Log out</button>
    </div>

    <div class="bg-white rounded-3xl p-8 border border-slate-100">
      <h2 class="text-2xl font-semibold mb-6">Manage Tasks</h2>
      
      <div class="text-center py-12 text-slate-400">
        <i class="fa-solid fa-list-check text-5xl mb-4"></i>
        <p class="text-lg">Task management coming soon</p>
        <p class="text-sm mt-1">You’ll be able to add, edit, and organize tasks here.</p>
      </div>
    </div>
  </div>

  <script>
    async function logout() {
      await fetch('/logout', { method: 'POST' });
      window.location.href = '/login';
    }
  </script>
</body>
</html>
