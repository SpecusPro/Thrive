<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thrive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full px-6">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-xl mb-6">
        <i class="fa-solid fa-seedling text-5xl text-violet-600"></i>
      </div>
      <h1 class="text-6xl font-bold text-white tracking-tight">Thrive</h1>
      <p class="text-white/90 mt-3 text-xl">Grow into your best self</p>
    </div>

    <div class="bg-white/95 backdrop-blur rounded-3xl p-8 shadow-2xl">
      <div class="space-y-4">
        <a href="/login" 
           class="block w-full py-4 bg-violet-600 hover:bg-violet-700 text-white text-center rounded-2xl font-semibold text-lg transition">
          <i class="fa-solid fa-right-to-bracket mr-2"></i> Log In
        </a>
      </div>
      <p class="text-center text-sm text-gray-500 mt-6">
        A gentle space to build daily habits
      </p>
    </div>
  </div>
</body>
</html>
