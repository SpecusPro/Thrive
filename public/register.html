<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thrive • Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-3 text-white">
        <i class="fa-solid fa-seedling text-4xl"></i>
        <span class="text-4xl font-bold">Thrive</span>
      </a>
    </div>

    <div class="bg-white rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Create your account</h2>

      <form id="registerForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Email</label>
          <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-violet-400" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-violet-400" required minlength="6">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">I am a...</label>
          <div class="flex gap-3">
            <label class="flex-1 cursor-pointer">
              <input type="radio" name="role" value="parent" class="peer hidden" checked>
              <div class="peer-checked:bg-violet-600 peer-checked:text-white border border-gray-200 peer-checked:border-violet-600 rounded-2xl py-3 text-center text-sm font-medium transition">Parent</div>
            </label>
            <label class="flex-1 cursor-pointer">
              <input type="radio" name="role" value="daughter" class="peer hidden">
              <div class="peer-checked:bg-violet-600 peer-checked:text-white border border-gray-200 peer-checked:border-violet-600 rounded-2xl py-3 text-center text-sm font-medium transition">Daughter</div>
            </label>
          </div>
        </div>
        
        <div id="displayNameField" class="hidden">
          <label class="block text-sm font-medium text-gray-600 mb-1.5">Display Name (for parent)</label>
          <input type="text" id="displayName" class="w-full px-4 py-3 border border-gray-200 rounded-2xl" placeholder="Emma">
        </div>

        <button type="submit" 
                class="w-full py-3.5 bg-violet-600 hover:bg-violet-700 text-white font-semibold rounded-2xl transition">
          Create Account
        </button>
      </form>

      <div id="error" class="mt-4 text-red-500 text-sm text-center hidden"></div>
      
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a href="/login" class="text-violet-600 hover:underline">Log in</a>
      </p>
    </div>
  </div>

  <script>
    // Show/hide display name field based on role
    document.querySelectorAll('input[name="role"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const field = document.getElementById('displayNameField');
        if (radio.value === 'daughter') {
          field.classList.remove('hidden');
        } else {
          field.classList.add('hidden');
        }
      });
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.add('hidden');

      const role = document.querySelector('input[name="role"]:checked').value;
      const payload = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: role
      };
      
      if (role === 'daughter') {
        payload.displayName = document.getElementById('displayName').value;
      }

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        const data = await res.json();
        if (data.role === 'parent') window.location.href = '/parent';
        else window.location.href = '/app';
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'Registration failed';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
